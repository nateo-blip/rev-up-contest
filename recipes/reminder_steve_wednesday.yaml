version: "1.0.0"
title: "REV UP Wednesday Reminder - Steve"
description: |
  Sends Steve a Wednesday morning Slack DM reminding him to update the REV UP contest.
  Wednesdays are Selfie Day so extra emphasis on that.

prompt: |
  Send a Slack DM to Steve McMahon (user ID: U09494QBDUG) with a Wednesday morning
  REV UP contest update reminder.

  Use this command:
  eval "$(/opt/homebrew/bin/brew shellenv)" && sq agent-tools slack post-message --channel "U09494QBDUG" --text "📸 *Happy Selfie Wednesday, Steve!* Time for your REV UP Q3 Fast Start update.\n\n📋 *Your Wednesday checklist:*\n• Remind your reps to post selfies in #us-field-players-only\n• Check midweek signs & activations progress\n• Update any new loans that came through\n\n🤳 It's Selfie Day — make sure your region shows up strong!"

  That's it. Just send the message and confirm it was delivered.

extensions:
  - name: developer
    type: builtin
